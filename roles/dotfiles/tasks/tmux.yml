---
- name: Process tmux configuration
  tags: [extra, dotfiles, dotfiles_tmux]
  block:
    - name: Check if tmux is installed
      ansible.builtin.command: which tmux
      register: dotfiles_tmux_check
      ignore_errors: true
      changed_when: false

    - name: Configure tmux if installed
      when: dotfiles_tmux_check.rc is defined and dotfiles_tmux_check.rc == 0
      block:
        - name: Check existing tmux.conf symlink
          ansible.builtin.stat:
            path: "{{ home_realpath }}/.tmux.conf"
          register: dotfiles_tmux_conf_stat

        - name: Create tmux.conf symlink
          ansible.builtin.file:
            src: "{{ home_realpath }}/.config/tmux/tmux.conf"
            dest: "{{ home_realpath }}/.tmux.conf"
            state: link
            force: true
          when: not (dotfiles_tmux_conf_stat.stat.islnk is defined and dotfiles_tmux_conf_stat.stat.lnk_source == home_realpath + '/.config/tmux/tmux.conf')

        - name: Ensure plugins directory structure exists
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - "{{ home_realpath }}/.config/tmux/plugins"
            - "{{ home_realpath }}/.config/tmux/plugins/tpm"

        - name: Check TPM repository status
          ansible.builtin.stat:
            path: "{{ home_realpath }}/.config/tmux/plugins/tpm/.git"
          register: dotfiles_tpm_repo

        - name: Clone TPM if needed
          ansible.builtin.git:
            repo: "https://github.com/tmux-plugins/tpm"
            dest: "{{ home_realpath }}/.config/tmux/plugins/tpm"
            version: master
            update: true
          when: not dotfiles_tpm_repo.stat.exists

        - name: Re-check TPM repository status after clone
          ansible.builtin.stat:
            path: "{{ home_realpath }}/.config/tmux/plugins/tpm/.git"
          register: dotfiles_tpm_repo_after

        - name: Set permissions for TPM executables
          ansible.builtin.file:
            path: "{{ item.path }}"
            mode: "0755"
            state: file
          loop:
            - { path: "{{ home_realpath }}/.config/tmux/plugins/tpm/tpm" }
            - { path: "{{ home_realpath }}/.config/tmux/plugins/tpm/bindings" }
            - { path: "{{ home_realpath }}/.config/tmux/plugins/tpm/scripts/install_plugins.sh" }
            - { path: "{{ home_realpath }}/.config/tmux/plugins/tpm/scripts/update_plugin.sh" }
            - { path: "{{ home_realpath }}/.config/tmux/plugins/tpm/scripts/clean_plugins.sh" }
          when: dotfiles_tpm_repo_after.stat.exists
          failed_when: false
