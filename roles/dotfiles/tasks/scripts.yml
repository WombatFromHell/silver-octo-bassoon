---
- name: Process scripts
  tags: [extra, dotfiles, dotfiles_scripts]
  block:
    - name: Ensure local bin exists
      ansible.builtin.file:
        path: "{{ home_realpath }}/.local/bin"
        state: directory
        mode: "0755"
      when: dotfiles_script_links_normalized is defined and dotfiles_script_links_normalized | length > 0

    - name: Link scripts directory
      ansible.builtin.file:
        path: "{{ scripts_dir }}"
        src: "{{ dotfiles_root }}/Configs/scripts"
        state: link
      when: dotfiles_root is defined

    - name: Check if niri is installed
      ansible.builtin.shell:
        cmd: command -v niri || test -x /usr/bin/niri || test -x /usr/local/bin/niri
        executable: /bin/bash
      register: dotfiles_niri_in_path
      failed_when: false
      changed_when: false

    - name: Filter script_links based on niri availability
      ansible.builtin.set_fact:
        dotfiles_script_links_filtered: >-
          {{
            script_links
            | rejectattr('src', 'equalto', 'niri_watcher.py')
            | list
            if dotfiles_niri_in_path.rc != 0
            else script_links
          }}
      when: script_links is defined

    - name: Normalize dest to list
      ansible.builtin.set_fact:
        dotfiles_script_links_normalized: >-
          {{
            dotfiles_script_links_normalized | default([]) +
            [{ 'src': item.src, 'dest': ([item.dest] if item.dest is string else item.dest) }]
          }}
      loop: "{{ dotfiles_script_links_filtered | default([]) }}"
      loop_control:
        loop_var: item

    - name: Check script source files exist
      ansible.builtin.stat:
        path: "{{ scripts_dir }}/{{ item.src }}"
      register: dotfiles_script_src_stat
      loop: "{{ dotfiles_script_links_normalized | default([]) }}"
      loop_control:
        loop_var: item
        label: "Checking {{ item.src }}"
      when:
        - (script_links is defined or dotfiles_script_links_normalized is defined)
        - (dotfiles_script_links_normalized | default([])) | length > 0

    - name: Build script existence lookup
      ansible.builtin.set_fact:
        dotfiles_script_exists: >-
          {{
            dotfiles_script_exists | default({}) |
            combine({item.item.src: item.stat.exists})
          }}
      loop: "{{ dotfiles_script_src_stat.results }}"
      loop_control:
        label: "{{ item.item.src }}"
      when: dotfiles_script_src_stat is defined and dotfiles_script_src_stat.results | length > 0

    - name: Link scripts
      ansible.builtin.file:
        path: "{{ item.1 }}"
        src: "{{ scripts_dir }}/{{ item.0.src }}"
        state: link
      with_subelements:
        - "{{ dotfiles_script_links_normalized | default([]) }}"
        - dest
      loop_control:
        label: "Linking {{ item.1 }}"
      when: dotfiles_script_exists[item.0.src] | default(false)
      become: "{{ item.1 is match('/(usr|etc|srv)/') }}"

    - name: Remove stale niri-watcher link when niri not installed
      when: dotfiles_niri_in_path.rc != 0
      become: true
      changed_when: "{{ not (ansible_check_mode | bool) }}"
      ansible.builtin.file:
        path: /usr/local/bin/niri-watcher
        state: absent

- name: Some Steam-specific Wayland enhancements
  tags: [extra, dotfiles, dotfiles_scripts]
  block:
    # Define the list of required scripts and their permissions
    - name: Define required scripts configuration
      ansible.builtin.set_fact:
        dotfiles_required_scripts:
          - path: "{{ scripts_dir }}/bazzified-steam.sh"
            name: "bazzified-steam.sh"
            required_for: ["steam", "gamescope"]
          - path: "{{ scripts_dir }}/steamos-session-select"
            name: "steamos-session-select"
            required_for: ["gamescope"]

    # Define the list of Steam desktop files to process
    - name: Define Steam desktop files configuration
      ansible.builtin.set_fact:
        dotfiles_steam_desktop_files:
          - script_path: "{{ scripts_dir }}/bazzified-steam.sh"
            template: "steam.desktop.j2"
            dest: "{{ home_realpath }}/.local/share/applications/steam.desktop"
            script_name: "bazzified-steam.sh"
            requires_scripts:
              - name: "bazzified-steam.sh"
                mode: "0755"
          - script_path: "{{ scripts_dir }}/bazzified-steam.sh"
            template: "steam-tenfoot.desktop.j2"
            dest: "{{ home_realpath }}/.local/share/applications/steam-tenfoot.desktop"
            script_name: "bazzified-steam.sh"
            requires_scripts:
              - name: "bazzified-steam.sh"
                mode: "0755"
          - script_path: "{{ scripts_dir }}/bazzified-steam.sh"
            template: "steam-gamescope.desktop.j2"
            dest: "{{ home_realpath }}/.local/share/applications/steam-gamescope.desktop"
            script_name: "bazzified-steam.sh"
            requires_scripts:
              - name: "bazzified-steam.sh"
                mode: "0755"
              - name: "steamos-session-select"
                mode: "0755"

    # --- Gather Facts ---

    - name: Check for presence of required scripts
      ansible.builtin.stat:
        path: "{{ item.path }}"
      register: dotfiles_script_stat_result
      loop: "{{ dotfiles_required_scripts }}"
      loop_control:
        loop_var: item
        label: "{{ item.name }}"

    - name: Check if Steam desktop files already exist
      ansible.builtin.stat:
        path: "{{ item.dest }}"
      register: dotfiles_desktop_file_stat_result
      loop: "{{ dotfiles_steam_desktop_files }}"
      loop_control:
        label: "{{ item.dest }}"

    # --- Consolidate Facts into Structured Dictionaries ---

    - name: Aggregate script statuses into a single dictionary
      ansible.builtin.set_fact:
        dotfiles_script_status: >-
          {{
            dict(
              dotfiles_script_stat_result.results
              | map(attribute='item.name')
              | zip(dotfiles_script_stat_result.results | map(attribute='stat'))
              | list
            )
          }}

    - name: Aggregate desktop file existence into a single dictionary
      ansible.builtin.set_fact:
        dotfiles_desktop_files_exist: >-
          {{
            dict(
              dotfiles_desktop_file_stat_result.results
              | map(attribute='item.dest')
              | zip(dotfiles_desktop_file_stat_result.results | map(attribute='stat.exists'))
              | list
            )
          }}

    # --- Take Action Based on Facts ---

    - name: Ensure required scripts have correct permissions
      ansible.builtin.file:
        path: "{{ item.key }}"
        mode: "0755"
      loop: "{{ dotfiles_script_status | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: item.value.exists and item.value.mode != '0755'

    - name: Install Steam desktop files if prerequisites are met
      ansible.builtin.template:
        src: "{{ role_path }}/templates/{{ item.template }}"
        dest: "{{ item.dest }}"
        mode: "0644"
      loop: "{{ dotfiles_steam_desktop_files }}"
      loop_control:
        label: "{{ item.dest }}"
      vars:
        required_scripts_exist: >-
          {{
            item.requires_scripts | map(attribute='name') |
            map('extract', dotfiles_script_status | default({})) |
            selectattr('exists', 'true') | list |
            length == item.requires_scripts | length
          }}
        required_scripts_correct_mode: >-
          {{
            item.requires_scripts | map(attribute='name') |
            map('extract', dotfiles_script_status | default({})) |
            selectattr('mode', 'equalto', '0755') | list |
            length == item.requires_scripts | length
          }}
      when:
        - not dotfiles_desktop_files_exist.get(item.dest, false)
        - required_scripts_exist
        - required_scripts_correct_mode
      notify: update_desktop_database
      check_mode: false

- name: Install squashfs actions desktop file
  tags: [extra, dotfiles, dotfiles_scripts]
  block:
    - name: Ensure kio servicemenus directory exists
      ansible.builtin.file:
        path: "{{ home_realpath }}/.local/share/kio/servicemenus/"
        state: directory
        mode: "0755"
        recurse: true

    - name: Check if squashfs-actions.desktop already exists
      ansible.builtin.stat:
        path: "{{ home_realpath }}/.local/share/kio/servicemenus/squashfs-actions.desktop"
      register: dotfiles_squashfs_desktop_stat

    - name: Copy squashfs-actions.desktop file
      ansible.builtin.copy:
        src: "{{ role_path }}/files/squashfs-actions.desktop"
        dest: "{{ home_realpath }}/.local/share/kio/servicemenus/squashfs-actions.desktop"
        mode: "0644"
      notify: rebuild_kde_servicemenu_cache
      when: not dotfiles_squashfs_desktop_stat.stat.exists
