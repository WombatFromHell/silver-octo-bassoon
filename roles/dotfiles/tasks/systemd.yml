---
- name: Systemd user units processing
  tags: [extra, dotfiles, dotfiles_systemd]
  when: dotfiles_root is defined
  block:
    - name: Check for systemd configs in dotfiles
      ansible.builtin.set_fact:
        dotfiles_systemd_user_dir: "{{ home_realpath }}/.config/systemd/user"
        dotfiles_systemd_service_files: >-
          {{- lookup('fileglob', dotfiles_root + '/Configs/systemd/.config/systemd/user/*.service', wantlist=true, errors='ignore') }}
        dotfiles_systemd_timer_files: >-
          {{- lookup('fileglob', dotfiles_root + '/Configs/systemd/.config/systemd/user/*.timer', wantlist=true, errors='ignore') }}

    - name: Determine if systemd configs exist
      ansible.builtin.set_fact:
        dotfiles_has_systemd: "{{ (dotfiles_systemd_service_files | length > 0) or (dotfiles_systemd_timer_files | length > 0) }}"

    - name: Process systemd unit files
      when: dotfiles_has_systemd
      block:
        - name: Ensure systemd user directory exists
          ansible.builtin.file:
            path: "{{ dotfiles_systemd_user_dir }}"
            state: directory
            mode: "0755"

        - name: Sync systemd unit files via tuckr
          ansible.builtin.command: tuckr add -f -y systemd
          register: dotfiles_tuckr_add
          changed_when: "'linked' in dotfiles_tuckr_add.stdout | lower"
          failed_when: false
          notify: reload_user_systemd

        - name: Check if vdirsyncer is installed and get real path
          ansible.builtin.shell:
            cmd: command -v vdirsyncer && readlink -f "$(command -v vdirsyncer)"
            executable: /bin/bash
          register: dotfiles_vdirsyncer_check
          failed_when: false
          changed_when: false

        - name: Set vdirsyncer facts
          ansible.builtin.set_fact:
            dotfiles_vdirsyncer_installed: "{{ dotfiles_vdirsyncer_check.rc == 0 }}"
            dotfiles_vdirsyncer_real_path: "{{ dotfiles_vdirsyncer_check.stdout_lines[-1] | default('', true) }}"

        - name: Check existing vdirsyncer symlink
          become: true
          ansible.builtin.stat:
            path: /usr/local/bin/vdirsyncer
          register: dotfiles_vdirsyncer_symlink_stat
          when: dotfiles_vdirsyncer_installed

        - name: Manage vdirsyncer symlink
          become: true
          ansible.builtin.file:
            path: /usr/local/bin/vdirsyncer
            src: "{{ dotfiles_vdirsyncer_real_path }}"
            state: link
            force: true
          when:
            - dotfiles_vdirsyncer_installed
            - not (dotfiles_vdirsyncer_symlink_stat.stat.islnk is defined and dotfiles_vdirsyncer_symlink_stat.stat.lnk_source == dotfiles_vdirsyncer_real_path)

        - name: Remove stale vdirsyncer symlink when not installed
          become: true
          ansible.builtin.file:
            path: /usr/local/bin/vdirsyncer
            state: absent
          when: not dotfiles_vdirsyncer_installed

        - name: Install vdirsyncer systemd units
          when: dotfiles_vdirsyncer_installed
          vars:
            _vdirsyncer_service_target: "{{ dotfiles_root }}/Configs/systemd/.config/systemd/user/vdirsyncer.service"
            _vdirsyncer_timer_target: "{{ dotfiles_root }}/Configs/systemd/.config/systemd/user/vdirsyncer.timer"
          block:
            - name: Check existing vdirsyncer service symlink
              ansible.builtin.stat:
                path: "{{ dotfiles_systemd_user_dir }}/vdirsyncer.service"
              register: dotfiles_vdirsyncer_service_stat

            - name: Install vdirsyncer systemd service
              ansible.builtin.file:
                path: "{{ dotfiles_systemd_user_dir }}/vdirsyncer.service"
                src: "{{ _vdirsyncer_service_target }}"
                state: link
                force: true
              when: >
                not (
                  dotfiles_vdirsyncer_service_stat.stat.islnk is defined and
                  dotfiles_vdirsyncer_service_stat.stat.lnk_source == _vdirsyncer_service_target
                )
              notify: reload_user_systemd

            - name: Check existing vdirsyncer timer symlink
              ansible.builtin.stat:
                path: "{{ dotfiles_systemd_user_dir }}/vdirsyncer.timer"
              register: dotfiles_vdirsyncer_timer_stat

            - name: Install vdirsyncer systemd timer
              ansible.builtin.file:
                path: "{{ dotfiles_systemd_user_dir }}/vdirsyncer.timer"
                src: "{{ _vdirsyncer_timer_target }}"
                state: link
                force: true
              when: >
                not (
                  dotfiles_vdirsyncer_timer_stat.stat.islnk is defined and
                  dotfiles_vdirsyncer_timer_stat.stat.lnk_source == _vdirsyncer_timer_target
                )
              notify: reload_user_systemd

    - name: Check if niri is installed
      ansible.builtin.shell:
        cmd: command -v niri
        executable: /bin/bash
      register: dotfiles_niri_in_path
      failed_when: false
      changed_when: false

    - name: Remove stale niri-watcher service when niri not installed
      when: dotfiles_niri_in_path.rc != 0
      ansible.builtin.file:
        path: "{{ dotfiles_systemd_user_dir }}/niri-watcher.service"
        state: absent
      notify: reload_user_systemd

    - name: Enable configured systemd user units
      when: enabled_systemd_units is defined and enabled_systemd_units | length > 0
      ansible.builtin.shell:
        cmd: |
          unit_path="{{ dotfiles_systemd_user_dir }}/{{ item }}"
          if [ -f "$unit_path" ] || [ -L "$unit_path" ]; then
            systemctl --user enable "{{ item }}"
          else
            echo "Skipping {{ item }}: unit file not found at $unit_path"
          fi
        executable: /bin/bash
      loop: "{{ enabled_systemd_units }}"
      loop_control:
        label: "{{ item }}"
      register: dotfiles_enable_result
      changed_when: dotfiles_enable_result.stdout is not search('Skipping')
      failed_when: false

    - name: Re-link via tuckr if any units were missing
      when:
        - dotfiles_enable_result is defined
        - dotfiles_enable_result.results | selectattr('stdout', 'search', 'Skipping') | list | length > 0
      ansible.builtin.command: tuckr add -f -y systemd
      register: dotfiles_tuckr_retry
      changed_when: "'linked' in dotfiles_tuckr_retry.stdout | lower"
      failed_when: false
      notify: reload_user_systemd

    - name: Re-enable configured systemd user units after tuckr retry
      when:
        - dotfiles_tuckr_retry is defined and dotfiles_tuckr_retry is changed
      ansible.builtin.shell:
        cmd: |
          unit_path="{{ dotfiles_systemd_user_dir }}/{{ item }}"
          if [ -f "$unit_path" ] || [ -L "$unit_path" ]; then
            systemctl --user enable "{{ item }}"
          fi
        executable: /bin/bash
      loop: "{{ enabled_systemd_units }}"
      loop_control:
        label: "{{ item }}"
      register: dotfiles_enable_retry
      changed_when: true
      failed_when: false
