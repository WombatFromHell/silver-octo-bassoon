---
# Role: dotfiles
# Description: Manage and symlink dotfiles configuration
# check_mode: Supported
#   - Symlinks: Reports changes but doesn't create links
#   - Config files: Reports changes but doesn't write
#   - Post-processing: Reports commands but doesn't execute
# Safe to run with --check for preview
- name: Dotfiles symlinking and post-processing
  tags: [extra, dotfiles]
  block:
    - name: Ensure dotfiles symlink exists
      ansible.builtin.file:
        path: "{{ home_realpath }}/.config/dotfiles"
        src: "{{ playbook_dir }}/files/dotfiles"
        state: link
        force: true

    - name: Preinstall Tuckr for dotfiles management
      ansible.builtin.import_tasks: tuckr.yml
      tags: [extra, dotfiles, dotfiles_tuckr]

    - name: Process dotfiles directories
      block:
        - name: Find program directories
          ansible.builtin.find:
            path: "{{ dotfiles_root }}/Configs"
            file_type: directory
            recurse: false
            excludes: "home,scripts,pipewire,systemd,tmux,niri"
          register: dotfiles_dirs
          no_log: true

        - name: Process programs with tuckr
          ansible.builtin.include_tasks: process_program.yml
          loop: "{{ dotfiles_dirs.files }}"
          loop_control:
            loop_var: program_item
            label: "{{ program_item.path | basename }}"
          vars:
            force_tuckr_overwrite: true
            program_name: "{{ program_item.path | basename }}"
            binary_name: "{{ (program_checks | default({})).get(program_name, program_name) }}"

    - name: Include home task
      ansible.builtin.import_tasks: home.yml
      tags: [extra, dotfiles, dotfiles_home]

    - name: Include scripts task
      ansible.builtin.import_tasks: scripts.yml
      tags: [extra, dotfiles, dotfiles_scripts]

    - name: Include systemd task
      ansible.builtin.import_tasks: systemd.yml
      tags: [extra, dotfiles, dotfiles_systemd]

    - name: Include systemd env.d task
      ansible.builtin.import_tasks: sysdenv.yml
      tags: [extra, dotfiles, dotfiles_env]

    - name: Include tmux task
      ansible.builtin.import_tasks: tmux.yml
      tags: [extra, dotfiles, dotfiles_tmux]

    # - name: Include niri task
    #   ansible.builtin.import_tasks: niri.yml
    #   tags: [extra, dotfiles, dotfiles_niri]

    # - name: Include pipewire task
    #   ansible.builtin.import_tasks: pipewire.yml
    #   tags: [extra, dotfiles, dotfiles_pipewire]

    - name: Include GPG task
      ansible.builtin.import_tasks: gpg.yml
      tags: [extra, dotfiles, dotfiles_gpg]

    - name: Include nvim task
      ansible.builtin.import_tasks: lazyvim.yml
      tags: [extra, dotfiles, dotfiles_lazyvim]
