---
# Default values for dotfiles role

# Feature toggles
enable_lazyvim: true
enable_ghostty: false
enable_alacritty: false

# Paths (support_dir is set by test group_vars or site.yml)
dotfiles_root: "{{ dotfiles_root | default(support_dir | default(playbook_dir | dirname ~ '/files')) }}/dotfiles"
scripts_dir: "{{ home_realpath }}/.local/bin/scripts"

# Program handlers (run after dotfiles processed)
program_handlers: {}
