---
- name: Handle Brave browser installation
  when: install_brave is defined and install_brave in ['flatpak', 'distrobox']
  tags: [extra, flatpak, flatpak_extra, flatpak_brave]
  vars:
    brave_app: com.brave.Browser

  block:
    # ===========================
    # Flatpak installation path
    # ===========================
    - name: Install Brave browser via Flatpak
      when: install_brave == "flatpak"
      community.general.flatpak:
        name: "{{ brave_app }}"
        state: present
        method: user

    - name: Install libva-nvidia-driver on Arch (Flatpak Brave)
      when:
        - install_brave == "flatpak"
        - os_release_id == "archlinux"
        - nvidia_exists | default(false)
      become: true
      ansible.builtin.package:
        name: "libva-nvidia-driver"
        state: present

    - name: Apply Chrome VAAPI fix (Flatpak Brave)
      when:
        - install_brave == "flatpak"
        - chrome_vaapi_fix | default(false)
        - nvidia_exists | default(false)
      block:
        - name: Check Brave VAAPI fix script
          ansible.builtin.stat:
            path: "{{ dotfiles_root }}/Configs/scripts/fix-vaapi-chromium-flatpak.sh"
          register: flatpak_brave_script
          ignore_errors: true

        - name: Set executable permission for Brave fix script
          ansible.builtin.file:
            path: "{{ flatpak_brave_script.stat.path }}"
            mode: "0755"
          when:
            - flatpak_brave_script.stat.exists is defined
            - flatpak_brave_script.stat.exists
            - not flatpak_brave_script.stat.isdir

        - name: Check if VAAPI driver files exist
          ansible.builtin.stat:
            path: "{{ home_realpath }}/.var/app/{{ brave_app }}/dri/{{ item }}"
          register: flatpak_vaapi_fix_check
          ignore_errors: true
          changed_when: false
          loop:
            - "nvidia_drv_video.so"
            - "radeonsi_drv_video.so"

        - name: Assert at least one VAAPI driver file exists
          ansible.builtin.assert:
            that:
              - flatpak_vaapi_fix_check is success
              - flatpak_vaapi_fix_check.results | selectattr('stat.exists') | list | length > 0
            fail_msg: "No VAAPI driver files found, will attempt to apply fix"
            success_msg: "VAAPI driver files already exist"
          register: flatpak_vaapi_check
          ignore_errors: true

        - name: Apply Brave VAAPI fix
          when:
            - flatpak_brave_script.stat.exists is defined
            - flatpak_brave_script.stat.exists
            - not flatpak_brave_script.stat.isdir
            - flatpak_vaapi_check is failed
          ansible.builtin.script: "{{ flatpak_brave_script.stat.path }}"
          register: flatpak_chromium_vaapi_fix
          ignore_errors: true
          changed_when: flatpak_chromium_vaapi_fix.rc == 0

    # ===========================
    # Distrobox installation path
    # ===========================
    - name: Install Brave via distrobox installer helper
      when: install_brave == "distrobox"
      block:
        - name: Check for install-brave.sh helper
          ansible.builtin.command: which install-brave.sh
          register: brave_installer_check
          changed_when: false
          failed_when: false

        - name: Assert install-brave.sh is available
          ansible.builtin.assert:
            that:
              - brave_installer_check.rc == 0
            fail_msg: "install-brave.sh not found in PATH. Ensure the dotfiles scripts directory is on your PATH."
            success_msg: "Found install-brave.sh at {{ brave_installer_check.stdout }}"

        - name: Run install-brave.sh to set up Brave in distrobox
          ansible.builtin.command: install-brave.sh --install stable
          register: brave_distrobox_install
          changed_when: >
            'installed' in brave_distrobox_install.stdout or
            'created' in brave_distrobox_install.stdout or
            'recreated' in brave_distrobox_install.stdout or
            'Export successful' in brave_distrobox_install.stdout
          failed_when: false

        - name: Apply Chrome VAAPI fix (Distrobox Brave)
          when:
            - chrome_vaapi_fix | default(false)
            - nvidia_exists | default(false)
          block:
            - name: Check Brave VAAPI fix script
              ansible.builtin.stat:
                path: "{{ dotfiles_root }}/Configs/scripts/fix-vaapi-chromium-flatpak.sh"
              register: brave_distrobox_vaapi_script
              ignore_errors: true

            - name: Set executable permission for Brave fix script
              ansible.builtin.file:
                path: "{{ brave_distrobox_vaapi_script.stat.path }}"
                mode: "0755"
              when:
                - brave_distrobox_vaapi_script.stat.exists is defined
                - brave_distrobox_vaapi_script.stat.exists
                - not brave_distrobox_vaapi_script.stat.isdir

            - name: Apply Brave VAAPI fix via script
              when:
                - brave_distrobox_vaapi_script.stat.exists is defined
                - brave_distrobox_vaapi_script.stat.exists
                - not brave_distrobox_vaapi_script.stat.isdir
              ansible.builtin.script: "{{ brave_distrobox_vaapi_script.stat.path }}"
              register: brave_vaapi_fix_applied
              ignore_errors: true
              changed_when: brave_vaapi_fix_applied.rc == 0
