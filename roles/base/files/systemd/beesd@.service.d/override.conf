[Unit]
BindsTo=beesd-maintenance.service
After=beesd-maintenance.service

[Service]
ExecStart=
ExecStart=/usr/bin/beesd --no-timestamps %i
Restart=no
RestartSec=10s
SuccessExitStatus=124
# Automatically stop beesd if it runs longer than 2 hours
RuntimeMaxSec=7200
CPUSchedulingPolicy=idle
OOMScoreAdjust=500
Nice=19
IOSchedulingClass=idle
IOSchedulingPriority=7
