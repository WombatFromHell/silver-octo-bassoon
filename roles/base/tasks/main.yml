---
# Role: base
# Description: Base system configuration for Arch Linux systems
# check_mode: Supported
#   - Package installation: Reports changes but doesn't install
#   - Configuration files: Reports changes but doesn't write
#   - Service management: Reports changes but doesn't restart
# Safe to run with --check for preview
- name: Include package management task
  ansible.builtin.import_tasks: pacman.yml
  when: os_release_id == "archlinux"
  tags: [core, pacman]

- name: Include AUR management task
  ansible.builtin.import_tasks: aur.yml
  when: os_release_id == "archlinux"
  tags: [core, aur]

- name: Include zram enablement task
  ansible.builtin.import_tasks: zram.yml
  when: os_release_id == "archlinux"
  tags: [core, zram]

- name: Include global binaries task
  ansible.builtin.import_tasks: globalbin.yml
  tags: [extra, globalbin]

- name: Include global systemd units task
  ansible.builtin.import_tasks: globalunits.yml
  tags: [extra, globalunits]

- name: Include etc configs task
  ansible.builtin.import_tasks: etc.yml
  tags: [extra, etc]

- name: Include sudoers configs task
  ansible.builtin.import_tasks: sudoers.yml
  tags: [extra, sudoers]

- name: Include polkit rules task
  ansible.builtin.import_tasks: polkit.yml
  tags: [extra, polkit]

- name: Include limitsd configs task
  ansible.builtin.import_tasks: limits.yml
  tags: [extra, limitsd]

- name: Include udev-rules.d task
  ansible.builtin.import_tasks: udev.yml
  tags: [extra, udev]

- name: Include bootloader task
  ansible.builtin.import_tasks: bootloader.yml
  tags: [extra, bootloader]

- name: Include fonts task
  ansible.builtin.import_tasks: fonts.yml
  tags: [extra, fonts]

- name: Include appimages task
  ansible.builtin.import_tasks: appimages.yml
  tags: [extra, appimages]

- name: Include brew install task
  ansible.builtin.import_tasks: brew.yml
  tags: [extra, brew]

- name: Include shortcuts install task
  ansible.builtin.import_tasks: shortcuts.yml
  tags: [extra, shortcuts]
