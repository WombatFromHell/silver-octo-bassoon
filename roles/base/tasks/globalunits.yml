---
- name: Copy and enable systemd units to /etc/systemd/system
  tags: [extra, globalunits]
  become: true
  vars:
    base_nvidia_enabled: "{{ nvidia_exists | default(false) }}"
    base_fix_wakeups_enabled: "{{ enable_fix_wakeups | default(false) }}"
  block:
    - name: Ensure /etc/systemd/system directory exists
      ansible.builtin.file:
        path: /etc/systemd/system
        state: directory
        mode: "0755"

    # Copy generic unit files (excludes NVIDIA conditionally)
    - name: Find all unit files in role's files/units directory
      ansible.builtin.find:
        paths: "{{ role_path }}/files/units"
        file_type: file
        recurse: false
        excludes: "{{ ['nvidia-tdp.*', 'veridian-controller.service'] if not base_nvidia_enabled else [] }}"
      register: base_unit_files

    - name: Copy unit files to /etc/systemd/system
      ansible.builtin.copy:
        src: "{{ file_item.path }}"
        dest: "/etc/systemd/system/{{ file_item.path | basename }}"
        mode: "0644"
        remote_src: false
        backup: true
      loop: "{{ base_unit_files.files }}"
      loop_control:
        loop_var: file_item
        label: "Copying {{ file_item.path | basename }}"
      when: base_unit_files.matched > 0
      notify: reload_global_systemd

    # Manage fix-wakeups.service
    - name: Copy fix-wakeups.service when enabled
      ansible.builtin.copy:
        src: "{{ role_path }}/files/units/fix-wakeups.service"
        dest: /etc/systemd/system/fix-wakeups.service
        mode: "0644"
        remote_src: false
        backup: true
      when: base_fix_wakeups_enabled
      notify: reload_global_systemd

    - name: Check if fix-wakeups.service exists
      ansible.builtin.stat:
        path: /etc/systemd/system/fix-wakeups.service
      register: base_fix_wakeups_service_stat

    - name: Stop and disable fix-wakeups.service when disabled
      ansible.builtin.systemd:
        name: fix-wakeups.service
        enabled: false
        state: stopped
      when:
        - not ansible_check_mode
        - base_fix_wakeups_service_stat.stat.exists
        - not base_fix_wakeups_enabled

    - name: Remove fix-wakeups.service when disabled
      ansible.builtin.file:
        path: /etc/systemd/system/fix-wakeups.service
        state: absent
      when:
        - base_fix_wakeups_service_stat.stat.exists
        - not base_fix_wakeups_enabled
      notify: reload_global_systemd

    # Cleanup: remove NVIDIA unit files when NVIDIA is disabled
    - name: Check if NVIDIA-related unit files exist (for cleanup)
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ item }}"
      register: base_nvidia_unit_stats
      loop:
        - nvidia-tdp.service
        - nvidia-tdp.timer
        - veridian-controller.service
      when: not base_nvidia_enabled

    - name: Stop and disable NVIDIA-related services if present
      ansible.builtin.systemd:
        name: "{{ item.item }}"
        enabled: false
        state: stopped
      loop: "{{ base_nvidia_unit_stats.results }}"
      when:
        - not ansible_check_mode
        - item.stat is defined
        - item.stat.exists
        - not base_nvidia_enabled
      failed_when: false

    - name: Remove NVIDIA-related unit files when NVIDIA is not present
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item.item }}"
        state: absent
      loop: "{{ base_nvidia_unit_stats.results }}"
      when:
        - item.stat is defined
        - item.stat.exists
        - not base_nvidia_enabled
      notify: reload_global_systemd

    # Configure scx_loader if service exists
    - name: Check if scx_loader.service exists
      ansible.builtin.stat:
        path: "{{ item }}"
      register: base_scx_service_stat
      changed_when: false
      loop:
        - /etc/systemd/system/scx_loader.service
        - /usr/lib/systemd/system/scx_loader.service
        - /lib/systemd/system/scx_loader.service

    - name: Set fact if scx_loader service exists
      ansible.builtin.set_fact:
        base_scx_service_exists: "{{ base_scx_service_stat.results | selectattr('stat.exists') | list | length > 0 }}"
      when: base_scx_service_stat.results is defined

    - name: Configure scx_loader if service exists
      when: base_scx_service_exists | default(false)
      block:
        - name: Check if scx_loader.toml already exists
          ansible.builtin.stat:
            path: /etc/scx_loader.toml
          register: base_existing_scx_toml
          changed_when: false

        - name: Backup existing scx_loader.toml if it exists
          ansible.builtin.copy:
            src: /etc/scx_loader.toml
            dest: /etc/scx_loader.toml.bak
            remote_src: true
            mode: "0644"
            owner: root
            group: root
            force: true
          when:
            - base_existing_scx_toml.stat.exists

        - name: Copy scx_loader.toml configuration
          ansible.builtin.copy:
            src: "{{ role_path }}/files/etc/scx_loader.toml"
            dest: /etc/scx_loader.toml
            mode: "0644"
            owner: root
            group: root
          notify: enable_scx_loader
