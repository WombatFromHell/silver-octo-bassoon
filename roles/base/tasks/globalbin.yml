---
- name: Copy binaries to /usr/local/bin
  tags: [extra, globalbin]
  become: true
  vars:
    base_nvidia_enabled: "{{ nvidia_exists | default(false) }}"
    base_fix_wakeups_enabled: "{{ enable_fix_wakeups | default(false) }}"
  block:
    - name: Ensure /usr/local/bin directory exists
      ansible.builtin.file:
        path: /usr/local/bin
        state: directory
        mode: "0755"

    # Copy generic binaries (excludes NVIDIA and fix-wakeups conditionally)
    - name: Find all binary files in role's files/bin directory
      ansible.builtin.find:
        paths: "{{ role_path }}/files/bin"
        file_type: file
        recurse: false
        excludes: >-
          {{
            (['nvidia-pm.py', 'veridian-controller'] if not base_nvidia_enabled else [])
            + (['fix-wakeups.sh'] if not base_fix_wakeups_enabled else [])
          }}
      register: base_bin_files

    - name: Copy binary files to /usr/local/bin with proper permissions
      ansible.builtin.copy:
        src: "{{ file_item.path }}"
        dest: "/usr/local/bin/{{ file_item.path | basename }}"
        mode: "0755"
        remote_src: false
        backup: true
      loop: "{{ base_bin_files.files }}"
      loop_control:
        loop_var: file_item
        label: "Copying {{ file_item.path | basename }}"
      when: base_bin_files.matched > 0

    # Cleanup: remove fix-wakeups.sh when disabled
    - name: Ensure fix-wakeups.sh is removed when disabled
      ansible.builtin.file:
        path: /usr/local/bin/fix-wakeups.sh
        state: absent
      when: not base_fix_wakeups_enabled

    # Cleanup: remove NVIDIA binaries when NVIDIA is disabled
    - name: Check if NVIDIA-related binaries exist (for cleanup)
      ansible.builtin.stat:
        path: "/usr/local/bin/{{ item }}"
      register: base_nvidia_bin_stats
      loop:
        - nvidia-pm.py
        - veridian-controller
      when: not base_nvidia_enabled

    - name: Remove NVIDIA-related binaries when NVIDIA is not present
      ansible.builtin.file:
        path: "/usr/local/bin/{{ item.item }}"
        state: absent
      loop: "{{ base_nvidia_bin_stats.results }}"
      when:
        - item.stat is defined
        - item.stat.exists
        - not base_nvidia_enabled

    # Manage fix-wakeups tmpfiles configuration
    - name: Manage fix-wakeups tmpfiles configuration via script
      ansible.builtin.script:
        cmd: "{{ role_path }}/files/bin/fix-wakeups.sh {{ 'install' if base_fix_wakeups_enabled else 'uninstall' }}"
      register: base_fix_wakeups_script_result
      changed_when: "'CHANGED' in base_fix_wakeups_script_result.stdout"
      when: base_fix_wakeups_script_result is not defined or base_fix_wakeups_script_result.rc is defined
