---
- name: Copy binaries to /usr/local/bin
  tags: [extra, globalbin]
  block:
    - name: Ensure /usr/local/bin directory exists
      become: true
      ansible.builtin.file:
        path: /usr/local/bin
        state: directory
        mode: "0755"

    - name: Find all binary files in role's files/bin directory
      ansible.builtin.find:
        paths: "{{ role_path }}/files/bin"
        file_type: file
        recurse: false
        # conditionally exclude nvidia related binaries and fix-wakeups.sh
        excludes: "{{ (['nvidia-pm.py', 'veridian-controller'] if not (nvidia_exists | default(false)) else []) + ['fix-wakeups.sh'] }}"
      register: base_bin_files

    - name: Copy binary files to /usr/local/bin with proper permissions
      ansible.builtin.copy:
        src: "{{ file_item.path }}"
        dest: "/usr/local/bin/{{ file_item.path | basename }}"
        mode: "0755"
        remote_src: false
        backup: true
      loop: "{{ base_bin_files.files }}"
      loop_control:
        loop_var: file_item
        label: "Copying {{ file_item.path | basename }}"
      when: base_bin_files.matched > 0
      become: true

    - name: Ensure old fix-wakeups.sh script is removed
      become: true
      ansible.builtin.file:
        path: /usr/local/bin/fix-wakeups.sh
        state: absent

    - name: Check if NVIDIA-related binaries exist (for cleanup)
      become: true
      ansible.builtin.stat:
        path: "/usr/local/bin/{{ item }}"
      register: base_nvidia_bin_stats
      loop:
        - nvidia-pm.py
        - veridian-controller
      when: not (nvidia_exists | default(false))

    - name: Remove NVIDIA-related binaries when NVIDIA is not present
      become: true
      ansible.builtin.file:
        path: "/usr/local/bin/{{ item.item }}"
        state: absent
      loop: "{{ base_nvidia_bin_stats.results }}"
      when:
        - item.stat is defined
        - item.stat.exists

    - name: Manage fix-wakeups tmpfiles configuration via script
      become: true
      ansible.builtin.script:
        cmd: "{{ role_path }}/files/bin/fix-wakeups.sh {{ 'install' if enable_fix_wakeups | default(false) else 'uninstall' }}"
      register: base_fix_wakeups_script_result
      changed_when: "'CHANGED' in base_fix_wakeups_script_result.stdout"
