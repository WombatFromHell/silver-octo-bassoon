---
- name: Check for beesd binary
  ansible.builtin.command: command -v beesd
  register: base_beeshd_binary
  changed_when: false
  check_mode: false

- name: Configure beesd
  tags: [beesd]
  when: base_beeshd_binary.rc == 0
  become: true
  block:
    - name: Create /etc/bees directory
      ansible.builtin.file:
        path: /etc/bees
        state: directory
        mode: "0755"

    - name: Copy beesd config files to /etc/bees
      ansible.builtin.copy:
        src: "{{ beesd_item }}"
        dest: "/etc/bees/{{ beesd_item | basename }}"
        mode: "0644"
        remote_src: false
        backup: true
      loop: "{{ query('fileglob', role_path + '/files/etc/bees/*.conf') }}"
      loop_control:
        loop_var: beesd_item
        label: "Copying {{ beesd_item | basename }}"

    - name: Ensure /etc/systemd/system/beesd@.service.d exists
      ansible.builtin.file:
        path: /etc/systemd/system/beesd@.service.d
        state: directory
        mode: "0755"

    - name: Copy beesd systemd override
      ansible.builtin.copy:
        src: "{{ role_path }}/files/systemd/beesd@.service.d/override.conf"
        dest: /etc/systemd/system/beesd@.service.d/override.conf
        mode: "0644"
        remote_src: false
        backup: true

    - name: Install beesd-maintenance service and timer
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0644"
        remote_src: false
        backup: true
      loop:
        - src: "{{ role_path }}/files/systemd/beesd-maintenance.service"
          dest: /etc/systemd/system/beesd-maintenance.service
        - src: "{{ role_path }}/files/systemd/beesd-maintenance.timer"
          dest: /etc/systemd/system/beesd-maintenance.timer
      loop_control:
        label: "Installing {{ item.dest | basename }}"

    - name: Reload systemd to pick up beesd changes
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start beesd-maintenance timer
      ansible.builtin.systemd:
        name: beesd-maintenance.timer
        enabled: true
        state: started
