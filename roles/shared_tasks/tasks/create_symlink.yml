---
# Create a symlink with proper error handling
#
# Usage:
#   ansible.builtin.include_tasks: create_symlink.yml
#   vars:
#     src: /path/to/source
#     dest: /path/to/link
#     force: true    # optional: overwrite existing
#     state: link    # optional: link, absent

- name: Create symlink
  ansible.builtin.file:
    src: "{{ src }}"
    dest: "{{ dest }}"
    state: "{{ state | default('link') }}"
    force: "{{ force | default(true) }}"
    mode: "'0777'"
  register: _symlink_result
  failed_when: false

- name: Verify symlink
  ansible.builtin.stat:
    path: "{{ dest }}"
  register: _link_stat

- name: Assert symlink was created
  ansible.builtin.assert:
    that:
      - _link_stat.stat.islnk is defined
      - _link_stat.stat.islnk
    fail_msg: "Symlink {{ dest }} was not created correctly"
    success_msg: "Symlink {{ dest }} -> {{ src }} created successfully"
  when: state | default('link') == 'link'
