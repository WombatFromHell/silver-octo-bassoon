---
# Install a script to a target directory with proper permissions
#
# Usage:
#   ansible.builtin.include_tasks: install_script.yml
#   vars:
#     src: "/path/to/script.sh"
#     dest: "/usr/local/bin/script"
#     mode: "0755"  # optional, default: 0755
#     owner: root   # optional
#     group: root   # optional

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ dest | dirname }}"
    state: directory
    mode: "0755"
  become: true

- name: Install script
  ansible.builtin.copy:
    src: "{{ src }}"
    dest: "{{ dest }}"
    mode: "{{ mode | default('0755') }}"
    owner: "{{ owner | default('root') }}"
    group: "{{ group | default('root') }}"
  become: true
  register: _install_script_result
  changed_when: _install_script_result.changed

- name: Verify script is executable
  ansible.builtin.stat:
    path: "{{ dest }}"
  register: _script_stat

- name: Assert script was installed correctly
  ansible.builtin.assert:
    that:
      - _script_stat.stat.exists
      - _script_stat.stat.isexec
    fail_msg: "Script {{ dest }} was not installed correctly"
    success_msg: "Script {{ dest }} installed successfully"
