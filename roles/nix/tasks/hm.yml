---
- name: Install Home-Manager for Nix
  tags: [extra, home_manager]
  when:
    - enable_nix | default(false)
    - (nix_installed.rc is defined and nix_installed.rc == 0) or
      (nix_installation is defined and nix_installation.rc is defined and nix_installation.rc == 0)
  vars:
    hm_binary: "{{ home_realpath }}/.nix-profile/bin/home-manager"
    git_repo: "git@github.com:WombatFromHell/automatic-palm-tree.git"

  block:
    - name: Check for existing home-manager binary
      ansible.builtin.stat:
        path: "{{ hm_binary }}"
      register: nix_hm_binary_stat

    - name: Check if nix-channel exists
      ansible.builtin.command: which nix-channel
      register: nix_channel_check
      ignore_errors: true
      changed_when: false

    - name: Add home-manager channel
      when:
        - not nix_hm_binary_stat.stat.exists
        - nix_channel_check.rc is defined and nix_channel_check.rc == 0
      ansible.builtin.command:
        cmd: nix-channel --add https://github.com/nix-community/home-manager/archive/master.tar.gz home-manager
      changed_when: true

    - name: Update nix channels
      when:
        - not nix_hm_binary_stat.stat.exists
        - nix_channel_check.rc is defined and nix_channel_check.rc == 0
      ansible.builtin.command:
        cmd: nix-channel --update
      changed_when: true

    - name: Install home-manager standalone binary
      when:
        - not nix_hm_binary_stat.stat.exists
        - nix_channel_check.rc is defined and nix_channel_check.rc == 0
      ansible.builtin.command:
        cmd: nix-shell '<home-manager>' -A install
      register: nix_hm_install_result
      changed_when: nix_hm_install_result.rc is defined and nix_hm_install_result.rc == 0

    - name: Check if '~/.config/home-manager' exists
      ansible.builtin.stat:
        path: "{{ home_realpath }}/.config/home-manager"
      register: nix_stat_hm_config

    - name: Initialize home-manager config
      ansible.builtin.command:
        cmd: "{{ hm_binary }} init --switch"
      when:
        - nix_hm_binary_stat.stat.exists
        - nix_stat_hm_config.stat is defined
        - not nix_stat_hm_config.stat.exists
      register: nix_hm_init_result
      changed_when: nix_hm_init_result.rc is defined and nix_hm_init_result.rc == 0

    - name: Check if '~/.nix' exists
      ansible.builtin.stat:
        path: "{{ home_realpath }}/.nix"
      register: nix_stat_home

    - name: Clone personal config
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        version: main
        dest: "{{ home_realpath }}/.nix"
      when:
        - nix_stat_home.stat is defined
        - not nix_stat_home.stat.exists
        - nix_hm_binary_stat.stat.exists

    - name: Re-check ~/.nix after clone
      ansible.builtin.stat:
        path: "{{ home_realpath }}/.nix"
      register: nix_stat_home_after

    - name: Run home-manager switch
      ansible.builtin.command:
        cmd: "{{ hm_binary }} switch --flake {{ home_realpath }}/.nix#{{ ansible_hostname }}"
      tags: [hm_deploy]
      when:
        - nix_hm_binary_stat.stat.exists
        - nix_stat_home_after.stat is defined
        - nix_stat_home_after.stat.exists
      register: nix_hm_switch_result
      changed_when: nix_hm_switch_result.rc is defined and nix_hm_switch_result.rc == 0
