---
# Role: nix
# Description: Install Nix package manager via Determinate Systems installer
# check_mode: Partially supported
#   - Installation check: Always runs (check_mode: false)
#   - Installation: Reports but doesn't execute in check mode
# WARNING: Running without --check will install Nix package manager
- name: Install Nix from Determinate Systems installer
  when: enable_nix | default(false)
  tags: [extra, nix]
  block:
    - name: Check if /nix mountpoint exists
      ansible.builtin.stat:
        path: /nix
      register: nix_mountpoint_stat
      changed_when: false

    - name: Check if Nix is already installed
      ansible.builtin.command: which nix
      register: nix_installed
      failed_when: false
      changed_when: false
      check_mode: false

    - name: Download Determinate Systems installer script
      when:
        - nix_mountpoint_stat.stat is defined
        - nix_mountpoint_stat.stat.exists
        - nix_mountpoint_stat.stat.isdir
        - nix_installed.rc is defined and nix_installed.rc != 0
      ansible.builtin.get_url:
        url: https://install.determinate.systems/nix
        dest: /tmp/nix-install.sh
        mode: "0755"
      register: nix_installer_download

    - name: Install Nix via Determinate Systems installer
      ansible.builtin.command: /tmp/nix-install.sh install --no-confirm
      when:
        - nix_installer_download is changed
        - nix_installed.rc is defined and nix_installed.rc != 0
      register: nix_installation
      changed_when: nix_installation.rc is defined and nix_installation.rc == 0

    - name: Include 'home-manager' tasks
      ansible.builtin.import_tasks: hm.yml
      tags: [extra, nix, home_manager]
      when: >
        (nix_installed.rc is defined and nix_installed.rc == 0) or
        (nix_installation is defined and nix_installation.rc is defined and nix_installation.rc == 0)
