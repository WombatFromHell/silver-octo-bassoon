wireplumber.settings = {
  node.restore-default-targets = false
}

monitor.bluez.rules = [
  {
    matches = [
      {
        # Use 'wpctl status' to verify this exact name
        node.name = "~bluez_output.*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2000
        priority.driver  = 2000
      }
    }
  }
]

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.pci-0000_03_00.1.hdmi-stereo-.*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1500
        priority.driver  = 1500
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_output.usb-SteelSeries_SteelSeries_Arctis_7-00.stereo-game"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1400
        priority.driver  = 1400
      }
    }
  }
]
