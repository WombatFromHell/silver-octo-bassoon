#!/usr/bin/env ansible-playbook
---
# Test all roles in sequence (smoke test)
# Usage: ansible-playbook tests/test_all_roles.yml --check

- name: Smoke test all roles
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - group_vars/all.yml

  vars:
    # Test-specific variables (overrides group_vars/all.yml)
    # Minimal config for smoke testing
    base_packages: []
    aur_packages: []
    enable_flatpak: false
    enable_btrfs_snapper: false
    enable_nix: false
    enable_vfio: false
    enable_lazyvim: false
    program_checks: {}

  pre_tasks:
    - name: Run system facts gathering
      ansible.builtin.include_role:
        name: system_facts
      tags: [always]

    - name: Test preflight
      ansible.builtin.debug:
        msg: "Running smoke test for all roles"

  roles:
    - base
    - dotfiles
    - mounts
    - flatpak
    - vfio
    - arpcbridge
    - nix
    - btrfs

  post_tasks:
    - name: Test summary
      ansible.builtin.debug:
        msg: |
          Smoke test completed successfully!
          All roles executed without errors.
