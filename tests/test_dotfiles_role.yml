#!/usr/bin/env ansible-playbook
---
# Test the dotfiles role independently
# Usage: ansible-playbook tests/test_dotfiles_role.yml --check

- name: Test dotfiles role
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - group_vars/all.yml

  vars:
    # Test-specific variables (overrides group_vars/all.yml)
    enable_lazyvim: false  # Disable to avoid nvim dependency
    program_checks: {}

  pre_tasks:
    - name: Run system facts gathering
      ansible.builtin.include_role:
        name: system_facts
      tags: [always]

  roles:
    - dotfiles

  post_tasks:
    - name: Test summary
      ansible.builtin.debug:
        msg: "Dotfiles role test completed successfully"
